<!DOCTYPE html>
<html>
<head>
  <title>Client lead Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Client lead Management System</h1>

<div class="form-box">
  <h2>Add New Lead</h2>
  <input id="name" placeholder="Client Name">
  <input id="email" placeholder="Email">
  <input id="source" placeholder="Lead Source (Website, Instagram etc)">
  <textarea id="notes" placeholder="Notes"></textarea>
  <button onclick="addLead()">Add Lead</button>
</div>

<h2>All Leads</h2>
<div id="leadList"></div>

<script src="script.js"></script>
</body>
</html>
